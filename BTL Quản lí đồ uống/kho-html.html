    <div class="khung-quan-li-kho">

                <button class="nut-chinh">+Thêm hàng hoá</button>

    <div class="thanh-bo-loc">

        <select class="o-nhap-lieu">
            <option value="">Tất cả</option>
            <option value="tra-sua">Trà sữa</option>
            <option value="coffee">Cà phê</option>
            <option value="nuoc-ep">Nước ép</option>
        </select>
        <select class="o-nhap-lieu">
            <option value="">Trạng thái</option>

            <option value="sap-het-hang">Sắp hết hàng</option>
            <option value="het-hang">Hết hàng</option>
        </select>
    </div>

    <div class="vung-chua-bang">
        <table class="bang-ton-kho">
            <tr>
                <th>Mã sp</th>
                <th>Hình ảnh</th>
                <th>Tên hàng hoá</th>
                <th>Tồn kho</th>

                <th>Thao tác</th>

            <tr>
                <td>-01</td>
                <td><div class="anh-sp"><img src="https://png.pngtree.com/png-vector/20230413/ourmid/pngtree-milk-tea-pearl-coconut-pattern-png-image_6698483.png"width=20%></div></td>

            </tr>

            <tr>
                <td>CF-01</td>
                <td><div class="anh-sp"><img src="https://png.pngtree.com/png-vector/20240720/ourmid/pngtree-coffee-cappuccino-icon-vector-illustration-illustratora-png-image_7241256.png"width=20%></div></td>
                <td>trân trâu</td>
                <td class="so-luong">10</td>
                <td><span class="nhan-trang-thai_bth">Sắp hết hàng</span></td>
                <td><button class="nut-sua">sửa</button></td>
